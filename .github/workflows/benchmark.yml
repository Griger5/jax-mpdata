name: benchmark

defaults:
  run:
    shell: bash

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  benchmark_implementations:
    name: Run all benchmarks on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15]
    steps:
      - uses: actions/checkout@v6
      
      - if: matrix.os == 'macos-15'
        run: brew reinstall gcc

      - if: startsWith(matrix.os, 'ubuntu-')
        run: sudo apt-get install libblitz0-dev libboost-thread-dev libboost-date-time-dev libboost-system-dev libboost-iostreams-dev libboost-timer-dev libboost-filesystem-dev

      - if: startsWith(matrix.os, 'macos-')
        run: brew install blitz boost

      - if: startsWith(matrix.os, 'ubuntu-')
        run: |
          git clone https://github.com/igfuw/libmpdataxx.git
          cd libmpdataxx/libmpdata++
          mkdir build
          cd build
          cmake .. -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          sudo make install
          cd ../../../
          rm -rf libmpdataxx

      # - if: startsWith(matrix.os, 'macos-')
      #   run: |
      #     git clone https://github.com/igfuw/libmpdataxx.git
      #     cd libmpdataxx/libmpdata++
      #     mkdir build
      #     cd build
      #     cmake .. \
      #       -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
      #       -DCMAKE_POLICY_DEFAULT_CMP0074=NEW \
      #       -DCMAKE_POLICY_DEFAULT_CMP0167=NEW \
      #       -DBoost_DIR=$(brew --prefix boost)/lib/cmake/Boost-1.90.0
      #     sudo make install
      #     cd ../../../
      #     rm -rf libmpdataxx

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install --verbose -e .[benchmarks]
      - run: pip install -e benchmarks/models/NCAR/

      - if: startsWith(matrix.os, 'ubuntu-')
        run: pip install -e benchmarks/models/libmpdata++/
      
      - if: startsWith(matrix.os, 'macos-')
        run: |
          export CMAKE_ARGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_POLICY_DEFAULT_CMP0074=NEW -DCMAKE_POLICY_DEFAULT_CMP0167=NEW -DCMAKE_CXX_FLAGS='-Wno-error=narrowing'"
          export CMAKE_PREFIX_PATH="/opt/homebrew"
          export LDFLAGS="-L/opt/homebrew/lib"
          export CPPFLAGS="-I/opt/homebrew/include"
          pip install -e benchmarks/models/libmpdata++/
      
      - run: python benchmarks/main.py