name: benchmark

defaults:
  run:
    shell: bash

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  benchmark_implementations:
    name: Run all benchmarks on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - run: pip install --verbose -e .[benchmarks]
      - run: python benchmarks/main.py